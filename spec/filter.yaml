# Route-retention policy for the pinned Cisco Intersight OpenAPI input.
# The generator keeps all /api/v1/** operations by default and applies only
# these committed denylist rules.
denylist:
  namespaces:
    # Cisco documents these APIs as internal Fabric Interconnect state APIs.
    - name: sw
      rationale: Internal Fabric Interconnect state APIs; not exposed to account administrators.
    # APIC-facing APIs are intentionally excluded from the MCP surface.
    - name: apic
      rationale: APIC APIs are intentionally excluded from the MCP surface.
    # DNAC-facing APIs are intentionally excluded from the MCP surface.
    - name: dnac
      rationale: DNAC APIs are intentionally excluded from the MCP surface.
    # Cloud-facing APIs are intentionally excluded from the MCP surface.
    - name: cloud
      rationale: Cloud APIs are intentionally excluded from the MCP surface.
    # Energy APIs are intentionally excluded from the MCP surface.
    - name: energy
      rationale: Energy APIs are intentionally excluded from the MCP surface.
    # Fault APIs are intentionally excluded from the MCP surface.
    - name: fault
      rationale: Fault APIs are intentionally excluded from the MCP surface.
    # FMC-facing APIs are intentionally excluded from the MCP surface.
    - name: fmc
      rationale: FMC APIs are intentionally excluded from the MCP surface.
    # Catalyst SD-WAN APIs are intentionally excluded from the MCP surface.
    - name: catalystsdwan
      rationale: Catalyst SD-WAN APIs are intentionally excluded from the MCP surface.
    # IAAS-facing APIs are intentionally excluded from the MCP surface.
    - name: iaas
      rationale: IAAS APIs are intentionally excluded from the MCP surface.
    # IWO tenant APIs are intentionally excluded from the MCP surface.
    - name: iwotenant
      rationale: IWO tenant APIs are intentionally excluded from the MCP surface.
    # LS APIs are intentionally excluded from the MCP surface.
    - name: ls
      rationale: LS APIs are intentionally excluded from the MCP surface.
    # Meraki APIs are intentionally excluded from the MCP surface.
    - name: meraki
      rationale: Meraki APIs are intentionally excluded from the MCP surface.
    # Cisco documents this namespace as deprecated and replaced by networkElement.
    - name: niaapi
      rationale: Deprecated namespace replaced by networkElement.
    # Partner integration APIs are intentionally excluded from the MCP surface.
    - name: partnerintegration
      rationale: Partner integration APIs are intentionally excluded from the MCP surface.
    # Power APIs are intentionally excluded from the MCP surface.
    - name: power
      rationale: Power APIs are intentionally excluded from the MCP surface.
    # Recommendation APIs are intentionally excluded from the MCP surface.
    - name: recommendation
      rationale: Recommendation APIs are intentionally excluded from the MCP surface.
    # SDA ACI APIs are intentionally excluded from the MCP surface.
    - name: sdaaci
      rationale: SDA ACI APIs are intentionally excluded from the MCP surface.
    # UCSD APIs are intentionally excluded from the MCP surface.
    - name: ucsd
      rationale: UCSD APIs are intentionally excluded from the MCP surface.
    # Cisco documents these APIs as NIA telemetry surfaces that are out of scope for this MCP.
    - name: niatelemetry
      rationale: NIA telemetry APIs are intentionally excluded from the MCP surface.
    # The generic telemetry Druid query surface is exposed through a custom MCP method instead.
    - name: telemetry
      rationale: Telemetry Druid APIs are replaced by a single custom MCP telemetry query method.
    # HyperFlex resources are intentionally excluded from the MCP surface.
    - name: hyperflex
      rationale: HyperFlex APIs are intentionally excluded from the MCP surface.
    # Cisco documents this namespace as deprecated external repository integration APIs.
    - name: externalsite
      rationale: Deprecated external software repository APIs.
  pathPrefixes: []
  operationIds: []
