name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag_name:
        description: Existing tag to release, for example v1.2.3
        required: true
        type: string
      release_notes:
        description: Optional release description shown on GitHub
        required: false
        type: string

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      VERSION: ${{ github.event_name == 'workflow_dispatch' && inputs.tag_name || github.ref_name }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag_name || github.ref }}

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Build release artifacts
        run: make build VERSION="${VERSION}"

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.VERSION }}
          body: ${{ github.event_name == 'workflow_dispatch' && inputs.release_notes || '' }}
          files: |
            bin/intersight-mcp-darwin-amd64
            bin/intersight-mcp-darwin-arm64
            bin/intersight-mcp-linux-amd64
            bin/intersight-mcp-linux-arm64
            bin/intersight-mcp-windows-amd64.exe
